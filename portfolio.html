<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио - КартПлейс</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="menu-trigger" onclick="window.location.href='index.html'">
            <span class="back-arrow">←</span>
            <span class="menu-label">На главную</span>
        </div>
        <div class="cart-trigger" onclick="openCart()">
            Корзина: <span id="header-total">0 ₽</span>
        </div>
    </header>

    <!-- Навигация портфолио (Убран раздел Комплексное) -->
    <nav class="portfolio-nav" id="portfolio-nav">
        <ul>
            <li><a href="#port-covers" class="nav-link active">Обложки</a></li>
            <li><a href="#port-infographics" class="nav-link">Инфографика</a></li>
            <li><a href="#port-rich" class="nav-link">Рич-контент</a></li>
            <li><a href="#port-video" class="nav-link">Видеообложки</a></li>
        </ul>
    </nav>

    <main class="portfolio-container">
        <section id="port-covers" class="portfolio-section">
            <h2>Обложки товаров</h2>
            <div class="portfolio-grid" id="grid-covers"></div>
        </section>

        <section id="port-infographics" class="portfolio-section">
            <h2>Инфографика</h2>
            <div class="portfolio-grid" id="grid-infographics"></div>
        </section>

        <section id="port-rich" class="portfolio-section">
            <h2>Рич-контент</h2>
            <div class="portfolio-grid" id="grid-rich"></div>
        </section>

        <section id="port-video" class="portfolio-section">
            <h2>Видеообложки</h2>
            <div class="portfolio-grid" id="grid-video"></div>
        </section>

        <!-- Секция "Комплексное" удалена временно -->
    </main>

    <div class="modal" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Корзина</h2>
                <span class="close-modal" onclick="closeCart()">&times;</span>
            </div>
            <div class="modal-body" id="cart-items"></div>
            <div class="modal-footer">
                <div class="total-row">
                    <span>Итого:</span>
                    <span id="modal-total">0 ₽</span>
                </div>
                <button class="btn-checkout" onclick="checkout()" id="checkout-btn">Оформить в Telegram</button>
            </div>
        </div>
    </div>

    <!-- Lightbox для просмотра изображений -->
    <div class="lightbox-modal" id="lightbox-modal" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="Увеличенное изображение">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
